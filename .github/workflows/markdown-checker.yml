name: Markdown Checker

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  check-links:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions-rust-lang/setup-rust-toolchain@v1
      - name: Install Setu
        run: cargo install setu-cli
      - name: Run Setu in strict mode
        run: setu-cli --strict .
